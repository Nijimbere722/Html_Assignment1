<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVIGATION -->
  <nav>
    <a href="index.html" title="Go to Home Page">Home</a>
    <a href="about.html" title="Learn about me">About</a>
    <a href="table.html" title="View data tables">Tables</a>
    <a href="form.html" title="Fill out a form">Form</a>
  </nav>

  <header>
    <h1>Student Registration Form</h1>
    <p>Please fill in the details below to register as a student.</p>
  </header>

  <main>
    <section>
      <form action="#" method="post">

        <!-- Text Input -->
        <div>
          <label for="fullname">Full Name:</label><br/>
          <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required />
        </div>

        <br/>

        <!-- Email Input -->
        <div>
          <label for="email">Email Address:</label><br/>
          <input type="email" id="email" name="email" placeholder="Enter your email" required />
        </div>

        <br/>

        <!-- Phone Number -->
        <div>
          <label for="phone">Phone Number:</label><br/>
          <input type="text" id="phone" name="phone" placeholder="Enter your phone number" />
        </div>

        <br/>

        <!-- Radio Buttons - Gender -->
        <div>
          <label>Gender:</label><br/>
          <input type="radio" id="male" name="gender" value="male" />
          <label for="male">Male</label>
          &nbsp;
          <input type="radio" id="female" name="gender" value="female" />
          <label for="female">Female</label>
          &nbsp;
          <input type="radio" id="other" name="gender" value="other" />
          <label for="other">Other</label>
        </div>

        <br/>

        <!-- Checkboxes - Courses -->
        <div>
          <label>Select Courses You Are Interested In:</label><br/>
          <input type="checkbox" id="webdev" name="courses" value="webdev" />
          <label for="webdev">Web Development</label><br/>

          <input type="checkbox" id="database" name="courses" value="database" />
          <label for="database">Database Systems</label><br/>

          <input type="checkbox" id="networking" name="courses" value="networking" />
          <label for="networking">Computer Networking</label><br/>

          <input type="checkbox" id="ai" name="courses" value="ai" />
          <label for="ai">Artificial Intelligence</label>
        </div>

        <br/>

        <!-- Submit Button -->
        <div>
          <input type="submit" value="Register Now" />
        </div>

      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 HTML Assignment. All rights reserved.</p>
  </footer>

</body>
</html>
